name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test-and-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # version read from package.json "packageManager"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Typecheck all packages
        run: |
          for p in packages/*/tsconfig.json apps/*/tsconfig.json cli/tsconfig.json runner/tsconfig.json benchmark/tsconfig.json; do
            npx tsc --noEmit -p "$p"
          done

      # Per-package tsconfigs only include src/ — the root project also covers tests.
      - name: Typecheck root project (includes tests)
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Unit tests
        run: pnpm test

      # Constitution gate (Principles I, II, V): every rule has fixtures, precision is
      # measured, every verified reproduction is confirmable, overall FP <= 10%.
      - name: Corpus precision + reproduction gate
        run: pnpm corpus:measure --corpus corpus-v1
